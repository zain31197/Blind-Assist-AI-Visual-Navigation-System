<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BlindAssist" />
    <meta name="description" content="AI-powered visual assistance. Real-time object detection and navigation for the visually impaired." />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- Prevent FOUC -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      #root { width: 100%; height: 100%; }
    </style>

    <title>Blind Assist — AI Visual Navigation</title>
  </head>
  <body>
    <noscript>
      <div style="background:#000;color:#fff;font-size:24px;padding:40px;text-align:center;font-family:sans-serif;">
        Blind Assist requires JavaScript. Please enable JavaScript in your browser settings.
      </div>
    </noscript>
    <div id="root" role="application" aria-label="Blind Assist - AI Visual Navigation"></div>
  </body>
</html>
